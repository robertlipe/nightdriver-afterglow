name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:

  setup:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Find environments
      id: envs
      run: |
        if [[ $(< config/ci_exclude.json) != '[]' ]]; then echo "::warning title=Some environments were skipped::Environments not built: $(< config/ci_exclude.json)"; fi
        echo "envs=$(tools/show_envs.py | jq -c --slurpfile ex config/ci_exclude.json '. - $ex[0]')" >> $GITHUB_OUTPUT

    - name: Cache PlatformIO packages
      id: pio-cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.platformio
          .pio/shared_libdeps
          .pio/libdeps
        key: pio-v2-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

    - name: Install PlatformIO
      if: steps.pio-cache.outputs.cache-hit != 'true'
      run: |
        curl -fsSL https://raw.githubusercontent.com/platformio/platformio-core-installer/master/get-platformio.py -o get-platformio.py
        python get-platformio.py
        echo "/home/runner/.platformio/penv/bin" >> $GITHUB_PATH

    - name: Run library setup
      if: steps.pio-cache.outputs.cache-hit != 'true'
      run: python3 tools/setup_shared_libs_cli.py

    - name: Seed Core Packages
      if: steps.pio-cache.outputs.cache-hit != 'true'
      # Fetch ESP32 and ESP32-S3 packages
      run: pio pkg install -e mesmerizer -e demo_amoled -e platecover

    outputs:
      envs: ${{ steps.envs.outputs.envs }}

  build-environment:
    runs-on: ubuntu-latest

    needs: [setup]

    strategy:
      fail-fast: false
      matrix:
        envname: ${{ fromJson(needs.setup.outputs.envs) }}

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Restore PlatformIO Cache
      uses: actions/cache/restore@v4
      with:
        path: |
          ~/.platformio
          .pio/shared_libdeps
          .pio/libdeps
        key: pio-v2-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

    - name: Install PlatformIO
      run: |
        if [ ! -x /home/runner/.platformio/penv/bin/pio ]; then
          curl -fsSL https://raw.githubusercontent.com/platformio/platformio-core-installer/master/get-platformio.py -o get-platformio.py
          python get-platformio.py
        fi
        echo "/home/runner/.platformio/penv/bin" >> $GITHUB_PATH

    - name: Copy secrets and clear SSID
      run: |
        grep -v "^#define cszSSID" include/secrets.example.h > include/secrets.h
        echo '#define cszSSID ""' >> include/secrets.h

    - name: "Build environment: ${{ matrix.envname }}"
      run: pio run -e ${{ matrix.envname }}

  call-web-installer:
    if: ( github.repository_owner == 'rbergen' && github.ref == 'refs/heads/staging' )

    needs: [build-environment]

    uses: ./.github/workflows/web_installer.yml
    with:
      release-name: ${{ github.ref_name }} commit ${{ github.sha }}
    secrets: inherit
    