; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documenation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
;
; There are numerous configurations of NightDriver that can be built here.  For example, the
; simplest is the DEMO config.  The HUB75 matrix project is the mesermizer.  You simply set
; default_envs to the project you wish to build.  There are project configs for various different
; NightDriver projects ranging from WiFi LED Strip to the simple lantern candle:
;
; demo          Simple WS2812B strip controller, runs a rainbow on PIN 5
; ledstrip      Waits for color data over wifi, so used for home displays, etc
; spectrum      M5StickCPlus project, a spectrum analyzer, on 48x16 WS2812B matrix
; mesmerizer    HUB75 info panel with audio effects, weather, info, etc

[platformio]
default_envs =
build_cache_dir = .pio/build_cache
extra_configs =
    custom_*.ini ; This file can be created in the root directory to store user defined devices and environments.

; ==================
; Shared Library Definitions
;
[shared_libs]
FastLED               = symlink://.pio/shared_libdeps/FastLED
Adafruit_BusIO        = symlink://.pio/shared_libdeps/Adafruit_BusIO
Adafruit_GFX_Library  = symlink://.pio/shared_libdeps/Adafruit_GFX_Library
arduinoFFT            = symlink://.pio/shared_libdeps/arduinoFFT
ESPAsyncWebServer     = symlink://.pio/shared_libdeps/ESPAsyncWebServer
ArduinoJson           = symlink://.pio/shared_libdeps/ArduinoJson
GifDecoder            = symlink://.pio/shared_libdeps/GifDecoder
AnimatedGIF           = symlink://.pio/shared_libdeps/AnimatedGIF
TJpg_Decoder          = symlink://.pio/shared_libdeps/TJpg_Decoder
U8g2                  = symlink://.pio/shared_libdeps/U8g2
Bounce2               = symlink://.pio/shared_libdeps/Bounce2
M5Unified             = symlink://.pio/shared_libdeps/M5Unified
AsyncTCP              = symlink://.pio/shared_libdeps/AsyncTCP
M5GFX                 = symlink://.pio/shared_libdeps/M5GFX
ESP_MPDMA             = symlink://.pio/shared_libdeps/ESP32_HUB75_LED_MATRIX_PANEL_DMA_Display
ESP_HUB75             = symlink://.pio/shared_libdeps/ESP_HUB75

; ==================
; Base configuration
;
; Options that are used (or extended) in all device sections (and hence environments) are defined here

[base]
upload_port     =
monitor_port    =
build_type      = release
upload_speed    = 2000000
monitor_speed   = 115200
build_flags     = -std=gnu++2a
                  -g
                  -Ofast
                  -ffunction-sections
                  -fdata-sections
                   !python3 tools/setup_shared_libs_cli.py
build_src_flags = -Wformat=2 ; Warnings for our code only, excluding libraries
                  -Wformat-truncation
                  -Wstack-usage=4096

# Exclude libraries that we don't control from 'pio check'.
# format is error number(optional :path_with_wildcards(optional :line_number))
check_flags     = cppcheck: --suppress=*:*src/uzlib/src/*

shared_lib_deps = fastled/FastLED               @ ^3.10.1
                  adafruit/Adafruit BusIO       @ ^1.17.2
                  adafruit/Adafruit GFX Library @ ^1.12.1
                  kosme/arduinoFFT              @ ^2.0.4
                  esp32async/ESPAsyncWebServer  @ ^3.7.10
                  bblanchon/ArduinoJson         @ ^7.4.2
                  https://github.com/PlummersSoftwareLLC/GifDecoder.git
                  bitbank2/AnimatedGIF          @ ^1.4.7
                  Bodmer/TJpg_Decoder           @ ^1.1.0
                  olikraus/U8g2                 @ ^2.36.12
                  thomasfredericks/Bounce2      @ ^2.72.0
                  m5stack/M5Unified             @ ^0.2.7
                  esp32async/AsyncTCP           @ ^3.4.10
                  m5stack/M5GFX                 @ ^0.2.3
                  mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display @ ^3.0.15
                  ; esphome/esp-hub75 @ ^0.1.0

lib_deps        = ${shared_libs.FastLED}
                  ${shared_libs.Adafruit_BusIO}
                  ${shared_libs.Adafruit_GFX_Library}
                  ${shared_libs.arduinoFFT}
                  ${shared_libs.ArduinoJson}

; pio pkg update keeps adding these back and pio LDF keeps finding deps
lib_ignore      = RPAsyncTCP, ESPAsyncTCP

; This partition table is the default and fits everything in 4M of flash without OTA.
board_build.partitions = config/partitions_custom_noota_v3.csv

; Libraries that are common to ALL devices rendering 2D graphics
graphics_deps = ${shared_libs.GifDecoder}
                ${shared_libs.AnimatedGIF}
                ${shared_libs.TJpg_Decoder}

oled_deps   = ${shared_libs.U8g2}
bounce_deps = ${shared_libs.Bounce2}
network_deps = WiFi
               ${shared_libs.ESPAsyncWebServer}
               ${shared_libs.AsyncTCP}

; Placeholder for legacy custom_*.ini references (IR remote flags removed)
[remote_flags]
build_flags     =
build_src_flags =

; ===============
; Device sections
; Sections starting with "dev_" contain general settings for a particular type of device.
; They extend the "base" config, both in general and in terms of build flags and dependencies,
; where applicable.

[dev_esp32]
extends         = base
board           = esp32dev
monitor_speed   = 115200
upload_speed    = 921600

[dev_esp32_s3]
extends         = base
board           = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
monitor_speed   = 115200
upload_speed    = 1000000

[dev_adafruit_feather]
extends         = dev_esp32_s3
board           = adafruit_feather_esp32s3_tft
monitor_speed   = 115200
upload_speed    = 1500000
build_flags     = ${dev_esp32_s3.build_flags}
                  -DUSER_SETUP_LOADED
                  -DST7789_2_DRIVER
                  -DTFT_WIDTH=135
                  -DTFT_HEIGHT=240
                  -DTFT_BL=45
                  -DTFT_BACKLIGHT_ON=HIGH
                  -DTFT_RGB_ORDER=TFT_RGB
                  -DTFT_CS=7
                  -DTFT_DC=39
                  -DTFT_RST=40
                  -DTFT_MOSI=35
                  -DTFT_MISO=37
                  -DTFT_SCLK=36
                  -DLOAD_GLCD=1
                  -DLOAD_GFXFF=1
                  -DSPI_FREQUENCY=27000000
                  -DUSE_HSPI_PORT=1
build_src_flags = ${feature_wifi.build_src_flags}
                  ${feature_ota.build_src_flags}
                  -DUSE_SCREEN=1
                  -DUSE_TFTSPI=1
                  -DTOUCH_CS=0
                  -DENABLE_WIFI=1
                  -DENABLE_OTA=1
                  -DESP32FEATHERTFT=1
                  -DTOGGLE_BUTTON_0=0

board_build.partitions = config/partitions_custom.csv
lib_deps        = ${dev_esp32_s3.lib_deps}
                  ${base.network_deps}
                  ${base.bounce_deps}
                  bodmer/TFT_eSPI @ ^2.5.43

[dev_heltec_wifi]
extends         = base
board           = heltec_wifi_kit_32
monitor_speed   = 115200
upload_speed    = 921600
build_flags     = ${base.build_flags}
                  -DARDUINO_HELTEC_WIFI_KIT_32=1
build_src_flags = -DUSE_SCREEN=1
lib_deps        = ${base.lib_deps}
                  ${base.network_deps}
                  ${base.oled_deps}

[dev_heltec_wifi_v2]
extends         = dev_heltec_wifi
board           = heltec_wifi_kit_32_v2
monitor_speed   = 115200
upload_speed    = 921600
build_flags     = ${dev_heltec_wifi.build_flags}
                  -DARDUINO_HELTEC_WIFI_KIT_32_V2=1
build_src_flags = ${dev_heltec_wifi.build_src_flags}
                  -DUSE_SSD1306=1

lib_deps        = ${dev_heltec_wifi.lib_deps}
                  heltecautomation/Heltec ESP32 Dev-Boards @ ^1.1.1

[dev_heltec_wifi_v3]
extends         = dev_esp32_s3
board           = heltec_wifi_kit_32_V3
monitor_speed   = 115200
upload_speed    = 921600
build_flags     = ${dev_esp32_s3.build_flags}
                  -DARDUINO_HELTEC_WIFI_KIT_32=1
                  -DARDUINO_HELTEC_WIFI_KIT_32_V3=1
build_src_flags = -DUSE_SCREEN=1
                  -DUSE_SSD1306=1
                  -DTOGGLE_BUTTON_1=0
                  -DDEFAULT_INFO_PAGE=0

lib_deps        = ${dev_esp32_s3.lib_deps}
                  ${base.network_deps}
                  ${base.oled_deps}
                  ${base.bounce_deps}
                  heltecautomation/Heltec ESP32 Dev-Boards @ ^1.1.1

[dev_heltec_wifi_lora_v3]
extends         = dev_esp32_s3
board           = heltec_wifi_lora_32_V3
build_flags     = ${dev_esp32_s3.build_flags}
                  -DARDUINO_HELTEC_WIFI_KIT_32=1
                  -DARDUINO_HELTEC_WIFI_LORA_32_V3=1
build_src_flags = -DUSE_SCREEN=1
                  -DUSE_SSD1306=1

lib_deps        = ${dev_esp32_s3.lib_deps}
                  ${base.network_deps}
                  ${base.oled_deps}
                  heltecautomation/Heltec ESP32 Dev-Boards @ ^1.1.1

[dev_lolin_d32_pro]
extends         = base
board           = lolin_d32_pro
monitor_speed   = 115200
upload_speed    = 921600

[dev_m5]
extends         = base
monitor_speed   = 115200
upload_speed    = 1500000
build_src_flags = -DUSE_SCREEN=1
                  -DTOGGLE_BUTTON_0=37
                  -DTOGGLE_BUTTON_1=39

lib_deps        = ${base.lib_deps}
                  ${base.network_deps}
                  ${base.bounce_deps}
                  ${shared_libs.M5GFX}
                  ${shared_libs.M5Unified}

[dev_m5stick_c]
