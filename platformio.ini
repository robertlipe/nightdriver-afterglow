build_src_flags = ${feature_espmpdma.build_src_flags}
                  -DPROJECT_NAME="\"Matrix S3/Mesmerizer\""
                  -DMESMERIZER=1
                  -DWAVESHARE_ESP32_S3_RGB_MATRIX=1
                  # -DUSE_ESP_HUB75=1
                  -DEFFECTS_FULLMATRIX=1
                  -DUSE_ALL_NETWORKING=1
                  -DMATRIX_WIDTH=64
                  -DMATRIX_HEIGHT=64
                  -DUSE_I2S_AUDIO=1
                  ; LRCLK
                  -DI2S_WS_PIN=7
                  -DI2S_BCLK_PIN=43
                  ; I2S_SDIN
                  -DINPUT_PIN=39
                  ${dev_ws_s3_hub75.build_flags}
lib_deps        = ${feature_espmpdma.lib_deps}
                  ; esphome/esp-hub75 @ ^0.1.0
                  ${base.graphics_deps}
                  ${base.lib_deps}
board_build.embed_files = ${embed_matrix_assets.board_build.embed_files}
