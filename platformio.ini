board           = m5stick-c
build_src_flags = ${dev_m5.build_src_flags}
                  -DM5STICKC=1
board_build.partitions = config/partitions_custom_noota_v3.csv

[dev_m5stick_c_plus]
extends         = dev_m5
board           = m5stick-c                         ; Requires the M5StickC Plus (note the Plus)
build_src_flags = ${dev_m5.build_src_flags}
                  -DM5STICKCPLUS=1
board_build.partitions = config/partitions_custom_noota_v3.csv

[dev_m5stick_c_plus2]
extends         = dev_m5
board           = m5stick-c                         ; Requires the M5StickC Plus2 (note the Plus2)
upload_speed    = 2000000
build_src_flags = ${dev_m5.build_src_flags}
                  -DM5STICKCPLUS2=1
board_build.partitions = config/partitions_custom_8M_v3.csv
board_upload.flash_size = 8MB

[dev_m5stack]
extends         = dev_m5
board           = m5stack-core2
build_src_flags = ${dev_m5.build_src_flags}
                  -DM5STACKCORE2=1
board_build.partitions = config/partitions_custom_8M_v3.csv
board_upload.flash_size = 8MB

[dev_elecrow_mesmerizer]
extends         = dev_esp32_s3
board           = esp32-s3-devkitc-1
monitor_speed   = 115200
upload_speed    = 1500000
lib_deps        = ${dev_esp32_s3.lib_deps}
                  ${base.network_deps}
                  ${base.oled_deps}
                  lovyan03/LovyanGFX @ ^1.1.7

[dev_tinypico]
extends         = base
board           = tinypico
monitor_speed   = 115200
upload_speed    = 1500000

[dev_wrover]
extends         = base
board           = esp-wrover-kit
monitor_speed   = 115200
upload_speed    = 1500000
lib_deps        = ${base.lib_deps}
                  ${base.network_deps}
                  adafruit/Adafruit ILI9341 @ ^1.5.10

[dev_mesmerizer]
extends         = dev_wrover
board           = esp-wrover-kit
upload_speed    = 4000000
monitor_speed   = 115200
board_build.partitions  = config/partitions_custom_8M_v3.csv
board_upload.flash_size = 8MB

[dev_lilygo_tdisplay_s3]
extends         = dev_esp32_s3
board           = esp32-s3-devkitc-1
build_src_flags = -DLILYGOTDISPLAYS3=1
                  -DPIN_SDA=21
                  -DTOGGLE_BUTTON_0=0
                  -DTOGGLE_BUTTON_1=14
lib_deps        = ${dev_esp32_s3.lib_deps}
                  ${base.network_deps}
                  ${base.bounce_deps}

[dev_lilygo_amoled]
extends        = dev_esp32_s3
board          = lilygo-t-amoled
monitor_speed  = 115200
upload_speed   = 1500000
build_flags    = ${dev_esp32_s3.build_flags}
                  -DARDUINO_USB_CDC_ON_BOOT=1
                  -DLV_CONF_PATH="../../../../include/amoled/lv_conf.h"
                  -DLV_CONF_INCLUDE_SIMPLE
                  ${psram_common_flags.build_flags}
build_src_flags = -DLILYGO_TDISPLAY_AMOLED_SERIES=1
                  -DAMOLED_S3=1
                  -DUSE_SCREEN=1
                  -DTOGGLE_BUTTON_0=21
                  -DTOGGLE_BUTTON_1=0
                  -DLED_PIN0=2
lib_deps       = ${dev_esp32_s3.lib_deps}
                 ${base.network_deps}
                 lewisxhe/SensorLib@^0.1.4
                 lewisxhe/XPowersLib@^0.2.1
                 https://github.com/lvgl/lvgl.git#release/v8.3
                 ${base.bounce_deps}

; https://docs.waveshare.com/ESP32-S3-Matrix
[dev_matrixs3]
extends        = dev_esp32_s3
board          = adafruit_matrixportal_esp32s3
build_flags    = ${dev_esp32_s3.build_flags}
                 ${psram_common_flags.build_flags}
lib_deps       = ${dev_esp32_s3.lib_deps}
                 ${base.graphics_deps}
                 ${base.lib_deps}
board_build.partitions = config/partitions_custom_8M_v3.csv

; https://docs.waveshare.com/ESP32-S3-RGB-Matrix
; This will probably need to change to something with QSPI...
[dev_ws_s3_hub75]
extends        = dev_esp32_s3
; board          = adafruit_matrixportal_esp32s3
board          = esp32-s3-devkitc-1
build_flags    = ${dev_esp32_s3.build_flags}
                 -DARDUINO_USB_CDC_ON_BOOT=1
                 ${psram_common_flags.build_flags}
lib_deps       = ${dev_esp32_s3.lib_deps}
                 ${base.graphics_deps}
                 ${base.lib_deps}
board_build.flash_mode = opi
board_build.arduino.memory_type = opi_opi
board_build.partitions = config/partitions_custom_8M_v3.csv

; ===================
; Capability sections
; The following sections contain build flags and/or dependencies to enable a particular capability
; or module in specific environments. They applicable option(s) - build_flags, lib_deps or both -
; are included in the environments in question.
;
; Note that these sections do not extend "base", as they are basically feature toggles.

; Build flags for use of PSRAM
[psram_common_flags]
build_flags     = -DUSE_PSRAM=1
                  -DBOARD_HAS_PSRAM=1
build_src_flags =

# https://docs.espressif.com/projects/esp-chip-errata/en/latest/esp32/03-errata-description/esp32/cpu-read-and-write-errors-related-to-access-sequence.html
[psram_lx6_flags]
build_flags     = ${psram_common_flags.build_flags}
                  -mfix-esp32-psram-cache-issue
build_src_flags =

[ttgo_deps]
build_flags     =
build_src_flags =
lib_deps        = https://github.com/Xinyuan-LilyGO/TTGO-T-Display
                  bodmer/TFT_eSPI @ ^2.5.43

; ================================================================
; Basic environment section, automatically inherited by all others

; ===================
; Capability Mixins (Ingredients)
; These provide ATOMIC features that can be mixed into any environment.

[feature_wifi]
build_src_flags = -DENABLE_WIFI=1

[feature_ota]
build_src_flags = -DENABLE_OTA=1

[feature_remote]
build_src_flags = -DENABLE_REMOTE=1

[feature_audio]
build_src_flags = -DENABLE_AUDIO=1
                  -DMAX_SAMPLES=512

[feature_audio_128]
build_src_flags = -DENABLE_AUDIO=1
                  -DMAX_SAMPLES=128

[feature_espmpdma]
build_src_flags = -DUSE_MPDMA_HUB75=1
lib_deps        = ${shared_libs.ESP_MPDMA}

[feature_esphub75]
build_src_flags = -DUSE_ESP_HUB75=1
lib_deps        = ${shared_libs.ESP_HUB75}

; ===================
; Project Logic Templates (Recipes)
; These contain only the core logic for a project, no hardware or capabilities.

[project_demo]
build_src_flags = -DDEMO=1
                  -DEFFECTS_DEMO=1

[project_spectrum]
build_src_flags = -DSPECTRUM=1
                  -DEFFECTS_SPECTRUM=1

[project_minimal]
build_src_flags = -DEFFECTS_MINIMAL=1

[project_hexagon]
build_src_flags = -DHEXAGON=1
                  -DEFFECTS_HEXAGON=1
                  -DHEX_MAX_DIMENSION=19
                  -DHEX_HALF_DIMENSION=10

; ===================
; Arduino Core Overlays
; These provide specific platform/partition overrides for Arduino v3 testing.

[arduino_v3_noota]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.30-2/platform-espressif32.zip
board_build.partitions = config/partitions_custom_noota_v3.csv

[arduino_v3_8m]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.30-2/platform-espressif32.zip
board_build.partitions = config/partitions_custom_8M_v3.csv
[env]
platform        = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework       = arduino
build_type      = release
build_unflags   = -std=gnu++11
lib_extra_dirs  = ${PROJECT_DIR}/lib
monitor_filters = esp32_exception_decoder
extra_scripts   = pre:run_audits.py
                  pre:install_intelhex.py
                  pre:tools/bake_site.py
                  post:tools/merge_image.py
board_build.embed_files = site/dist/index.html.gz
                          site/dist/index.js.gz
                          site/dist/favicon.ico.gz
board_build.embed_txtfiles = config/timezones.json

; ================================================================
; Shared embed assets (avoid duplication across projects)

[embed_matrix_assets]
build_flags     =
build_src_flags =
board_build.embed_files = assets/bmp/brokenclouds.jpg
                          assets/bmp/brokencloudsnight.jpg
                          assets/bmp/clearsky.jpg
                          assets/bmp/clearnight.jpg
                          assets/bmp/fewclouds.jpg
                          assets/bmp/fewcloudsnight.jpg
                          assets/bmp/lowreslogo.jpg
                          assets/bmp/mist.jpg
                          assets/bmp/mistnight.jpg
                          assets/bmp/rain.jpg
                          assets/bmp/rainnight.jpg
                          assets/bmp/scatteredclouds.jpg
                          assets/bmp/scatteredcloudsnight.jpg
                          assets/bmp/showerrain.jpg
                          assets/bmp/showerrainnight.jpg
                          assets/bmp/snow.jpg
                          assets/bmp/snownight.jpg
                          assets/bmp/thunderstorm.jpg
                          assets/bmp/thunderstormnight.jpg
                          assets/gif/colorsphere.gif
                          assets/gif/atomic.gif
                          assets/gif/pacman.gif
                          assets/gif/threerings.gif
                          assets/gif/banana.gif
                          assets/gif/tesseract.gif
                          assets/gif/firelog.gif
                          assets/gif/nyancat.gif
                          ${env.board_build.embed_files}

; ================================================================
; Common project configurations
;

[mesmerizer_config]
build_flags     = ${psram_lx6_flags.build_flags}
build_src_flags = ${feature_wifi.build_src_flags}
                  ${feature_ota.build_src_flags}
                  ${feature_remote.build_src_flags}
                  ${feature_audio.build_src_flags}
                  ${feature_espmpdma.build_src_flags}
                  -DMESMERIZER=1
                  -DSHOW_FPS_ON_MATRIX=0
                  -DESP32_I2S_DEVICE=1
                  -DSHOW_VU_METER=1
                  -DEFFECTS_FULLMATRIX=1
                  -DCOLOR_ORDER=EOrder::RGB
                  -DTIME_BEFORE_LOCAL=2
                  -DMATRIX_WIDTH=64
                  -DMATRIX_HEIGHT=32
                  -DIR_REMOTE_PIN=39
                  -DTOGGLE_BUTTON_0=0

lib_deps        = ${feature_espmpdma.lib_deps}
                  ${base.lib_deps}
                  ${base.network_deps}
                  ${base.graphics_deps}
                  ${base.bounce_deps}

board_build.embed_files = ${embed_matrix_assets.board_build.embed_files}

; ====================
; Project Environments
;
; These define specific projects with their base board type, project defines, and effect sets

[env:demo]
extends         = dev_esp32
build_src_flags = ${project_demo.build_src_flags}
                  -DPROJECT_NAME="\"Demo\""
                  -DMATRIX_WIDTH=144
                  -DTIME_BEFORE_LOCAL=0
lib_ignore      = ${base.lib_ignore}
                  WiFi
                  Network
                  Networking
                  WiFiClientSecure
                  HTTPClient
                  ArduinoOTA
                  Update
                  ESPmDNS

[env:m5demo]
extends         = dev_m5stick_c
build_src_flags = ${dev_m5stick_c.build_src_flags}
                  ${project_demo.build_src_flags}
                  ${feature_wifi.build_src_flags}
                  ${feature_audio.build_src_flags}
                  -DPROJECT_NAME="\"M5Demo\""
                  -DMATRIX_WIDTH=144*5+38
                  -DTIME_BEFORE_LOCAL=2
                  -DENABLE_WEBSERVER=0
                  -DCOLORDATA_SERVER_ENABLED=0
                  -DLED_PIN0=32

[m5demobase]
build_flags     =
build_src_flags = ${feature_wifi.build_src_flags}
                  ${feature_audio.build_src_flags}
                  -DEFFECTS_FULLMATRIX=1
                  -DUSE_MATRIX=1
                  -DMATRIX_WIDTH=64
                  -DMATRIX_HEIGHT=32
                  -DSHOW_VU_METER=1
                  -DTIME_BEFORE_LOCAL=2
                  -DENABLE_WEBSERVER=0
                  -DCOLORDATA_SERVER_ENABLED=0
                  -DDEFAULT_EFFECT_INTERVAL=0
                  -DLED_PIN0=-1
                  -DDEFAULT_INFO_PAGE=2

lib_deps        = ${base.graphics_deps}
board_build.embed_files = ${embed_matrix_assets.board_build.embed_files}

; M5Stick C Plus demo - extends the base matrix demo configuration
[env:m5plusdemo]
extends         = dev_m5stick_c_plus2
build_src_flags = ${dev_m5stick_c_plus2.build_src_flags}
                  ${m5demobase.build_src_flags}
                  -DPROJECT_NAME="\"M5Plus2Demo\""

lib_deps        = ${dev_m5stick_c_plus2.lib_deps}
                  ${m5demobase.lib_deps}
board_build.embed_files = ${m5demobase.board_build.embed_files}

[env:pdpwopr]
extends         = dev_m5stick_c_plus2
build_src_flags = ${dev_m5stick_c_plus2.build_src_flags}
                  ${project_spectrum.build_src_flags}
                  ${feature_wifi.build_src_flags}
                  ${feature_ota.build_src_flags}
                  ${feature_remote.build_src_flags}
                  ${feature_audio_128.build_src_flags}
                  -DEFFECTS_PDPWOPR=1
                  -DPOWER_LIMIT_MW=1500
                  -DDEFAULT_EFFECT_INTERVAL=0
                  -DPROJECT_NAME="\"PDPWOPR\""
                  -DTIME_BEFORE_LOCAL=2
                  -DCOLORDATA_SERVER_ENABLED=0
                  -DLED_PIN0=32
                  -DMATRIX_WIDTH=16
                  -DMATRIX_HEIGHT=16

[env:m5stackdemo]
extends         = dev_m5stack
build_src_flags = ${dev_m5stack.build_src_flags}
                  -DPROJECT_NAME="\"M5StackDemo\""

lib_deps        = ${dev_m5stack.lib_deps}
                  ${m5demobase.lib_deps}
board_build.embed_files = ${m5demobase.board_build.embed_files}

